name: flask selenium test run

on: [push]

jobs:
    test:
        runs-on: ubuntu-latest

        services:
            selenium:
                image: selenium/standalone-chrome
                ports:
                    - 4444:4444

        steps:
            - uses: actions/checkout@v3

            - name: setup python
              uses: actions/setup-python@v4
              with:
                  python-version: 3.10

            - name: instal deps
              run: pip install flask selenium

            - name: run flask app
              run: |
                  python app.py &
                  sleep 5
            - name: run tests
              run: python test.py

            - name: upload screenshots
              if: always()
              uses: action/uploads-artifacts@v3
              with:
                  name: screenshots
                  path: screenshots/
